<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong theme
      // during hydration. Mirrors the system-preference default in use-theme.ts.
      document.documentElement.dataset.theme = window.matchMedia("(prefers-color-scheme: dark)")
        .matches
        ? "dark"
        : "light";
    </script>
    <title>WiFi QR Codes in Seconds - getwifi.link</title>
    <meta
      name="description"
      content="Create WiFi QR Codes in seconds! Sharing WiFi credentials with a QR code makes it easy for your guests to connect to your WiFi network without entering a long and complicated password."
    />
  </head>

  <body>
    <div id="app"></div>
    <script prerender type="module" src="/src/main.tsx"></script>
  </body>
</html>
